<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>번역기 설정</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-body">
    <main class="settings-layout">
      <section class="settings-card">
        <p class="eyebrow">Configuration</p>
        <h1>번역기 설정</h1>
        <p class="description">OpenAI API 키를 저장하면 선택한 문장을 한국어로 번역할 수 있습니다.</p>

        <form id="settingsForm" class="settings-form">
          <label for="apiKey">OpenAI API Key</label>
          <input id="apiKey" name="apiKey" type="password" autocomplete="off" placeholder="sk-..." />

          <label for="model">Model</label>
          <input id="model" name="model" type="text" placeholder="gpt-5.4-mini" />

          <label for="translationTone">번역 톤</label>
          <select id="translationTone" name="translationTone">
            <option value="natural">자연스럽게</option>
            <option value="literal">직역에 가깝게</option>
            <option value="formal">격식 있게</option>
            <option value="concise">짧고 간결하게</option>
          </select>

          <label for="bubbleFont">번역 말풍선 글꼴</label>
          <select id="bubbleFont" name="bubbleFont">
            <option value="system">시스템 기본</option>
            <option value="sans">고딕 계열</option>
            <option value="serif">명조 계열</option>
            <option value="mono">고정폭</option>
          </select>

          <label for="bubbleFontSize">번역 말풍선 글자 크기</label>
          <select id="bubbleFontSize" name="bubbleFontSize">
            <option value="xsmall">더 작게</option>
            <option value="small">작게</option>
            <option value="medium">보통</option>
            <option value="large">크게</option>
            <option value="xlarge">더 크게</option>
          </select>

          <label class="checkbox-field" for="showInlineButton">
            <input id="showInlineButton" name="showInlineButton" type="checkbox" />
            <span>문장 선택 시 번역 버튼 표시</span>
          </label>

          <p class="description">기본 단축키는 Alt+Z입니다. 크롬 확장 단축키 설정에서 변경할 수 있습니다.</p>

          <div class="actions">
            <button type="submit" class="primary-button">저장</button>
          </div>
        </form>

        <p id="saveStatus" class="status"></p>
      </section>
    </main>

    <script src="options.js" type="module"></script>
  </body>
</html>
