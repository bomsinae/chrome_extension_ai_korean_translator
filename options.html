<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>번역기 설정</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-body">
    <main class="settings-layout">
      <section class="settings-card">
        <p class="eyebrow">Configuration</p>
        <h1>번역기 설정</h1>
        <p class="description">OpenAI API 키를 저장하면 선택한 문장을 한국어로 번역할 수 있습니다.</p>

        <form id="settingsForm" class="settings-form">
          <label for="apiKey">OpenAI API Key</label>
          <input id="apiKey" name="apiKey" type="password" autocomplete="off" placeholder="sk-..." />

          <label for="model">Model</label>
          <input id="model" name="model" type="text" placeholder="gpt-4.1-mini" />

          <label class="checkbox-field" for="showInlineButton">
            <input id="showInlineButton" name="showInlineButton" type="checkbox" />
            <span>문장 선택 시 번역 버튼 표시</span>
          </label>

          <div class="actions">
            <button type="submit" class="primary-button">저장</button>
          </div>
        </form>

        <p id="saveStatus" class="status"></p>
      </section>
    </main>

    <script src="options.js" type="module"></script>
  </body>
</html>
